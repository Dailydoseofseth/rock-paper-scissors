<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="./css/styles.css" />

    <title>R... P... S... : Go!!</title>
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1>
          <span class="hard"> Rock, </span>
          Paper,
          <span class="blood"> Scissors </span>
        </h1>
      </header>

      <main>
        <div class="scoreboard">
          <div class="badge" id="user-label">user</div>
          <div class="badge" id="computer-label">computer</div>
          <span id="user-score">0</span>:<span id="computer-score">0</span>
        </div>

        <form id="rps-form">
          <label for="choice">Choose👇 Your👇 Weapon👇</label>

          <div id="selectSubmitDiv">
            <select name="choice" id="choice">
              <option value="">--Select--</option>
              <option value="rock">rock</option>
              <option value="paper">paper</option>
              <option value="scissors">scissors</option>
            </select>

            <button type="submit">Go !</button>
          </div>
        </form>
        <div id="result"></div>
      </main>
    </div>

    <script src="./js/custom.js"></script>
  </body>
</html>
